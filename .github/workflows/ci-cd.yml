name: 🛸 NSA-Level CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # STAGE 1: QUALITY GATES (Parallel)
  # ------------------------------------------------------------------
  quality-backend:
    name: 🐘 Backend Quality (PHPUnit/PHPCS)
    runs-on: ubuntu-24.04
    steps:
    
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Setup PHP (Native)
      run: |
        sudo add-apt-repository -y ppa:ondrej/php
        sudo apt-get update
        sudo apt-get install -y php8.2-cli php8.2-mbstring php8.2-intl php8.2-gd php8.2-xml php8.2-curl php8.2-zip
        sudo update-alternatives --set php /usr/bin/php8.2

    - name: Create Dummy Config (For Testing)
      run: |
        cd api
        echo "<?php if(!defined('HIBP_API_KEY')) define('HIBP_API_KEY', 'test'); if(!defined('GEMINI_API_KEY')) define('GEMINI_API_KEY', 'test'); if(!defined('GEMINI_MODEL')) define('GEMINI_MODEL', 'gemini-1.5-flash'); ?>" > config.php

    - name: Install Composer Dependencies
      run: |
        cd api
        composer install --prefer-dist --no-progress

    - name: 🛡️ Lint (PHPCS)
      run: |
        cd api
        composer lint

    - name: 🧪 Unit Tests (PHPUnit)
      run: |
        cd api
        composer test

  quality-frontend:
    name: ⚛️ Frontend Quality (Build Check)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install Frontend Deps
      run: |
        cd client
        npm ci || npm ci || npm ci

    - name: 🛡️ Linter (ESLint)
      run: |
        cd client
        npm run lint

    - name: 🏗️ Verify Build
      run: |
        cd client
        npm run build

  # ------------------------------------------------------------------
  # STAGE 2: DEPLOYMENT (Only if Quality Passes)
  # ------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Hostinger
    needs: [quality-backend, quality-frontend] # <--- THE GUARD
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PHP (Native)
        run: |
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update
          sudo apt-get install -y php8.2-cli php8.2-mbstring php8.2-intl php8.2-gd php8.2-xml php8.2-curl php8.2-zip
          sudo update-alternatives --set php /usr/bin/php8.2

      - name: 🔨 Build Frontend
        run: |
          cd client
          npm ci || npm ci || npm ci
          npm run build
          # ------------------------------------------------------------------
      # 2.B INSTALL PHP DEPENDENCIES
      # ------------------------------------------------------------------
      - name: 🐘 Install Composer Dependencies
        run: |
          cd api
          composer install --no-dev --optimize-autoloader --prefer-dist
          cd ..

      # ------------------------------------------------------------------
      # 3. BUILD & PREPARE DEPLOYMENT PACKAGE
      # ------------------------------------------------------------------
      - name: Create Deployment Package
        run: |
          mkdir -p deploy_package
          
          # Copy Frontend Build
          cp -r client/dist/* deploy_package/
          
          # Copy PHP Backend
          mkdir -p deploy_package/api
          cp api/*.php deploy_package/api/
          
          # Copy Services & Vendor
          cp -r api/services deploy_package/api/
          cp -r api/vendor deploy_package/api/
          cp api/composer.json deploy_package/api/
          cp api/composer.lock deploy_package/api/
          
          # Ensure reports directory exists
          mkdir -p deploy_package/api/reports
          cp api/reports/mock.pdf deploy_package/api/reports/ || true

          # Copy Server Config & Doctor
          cp .htaccess deploy_package/
          cp doctor.php deploy_package/
          cp check_hibp.php deploy_package/
          cp log_investigator.php deploy_package/
          cp system_doctor.php deploy_package/
          cp test_scan_full.php deploy_package/
          cp test_status.php deploy_package/
          cp mapard_doctor.php deploy_package/
          cp debug.php deploy_package/
          cp mapard_read_log.php deploy_package/
          cp test_status_direct.php deploy_package/
          cp mapard_deep_doctor.php deploy_package/
          cp mapard_wipe.php deploy_package/
          cp test_gemini_key.php deploy_package/
          cp test_collector.php deploy_package/

          
          echo "✅ Deployment package created with PHP Backend + React Frontend"
          ls -R deploy_package

      # ------------------------------------------------------------------
      # 4. DEPLOY TO HOSTINGER (LFTP)
      # ------------------------------------------------------------------
      - name: 📂 Ship it! (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          which lftp || (sudo apt-get update && sudo apt-get install -y lftp)
          lftp -e "set ftp:ssl-allow no; open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; mirror -R -x \".git*\" -x \"node_modules/*\" deploy_package/ ./; quit"

  # ------------------------------------------------------------------
  # STAGE 3: ANDROID BUILD (Parallel)
  # ------------------------------------------------------------------
  build-android:
    name: 📱 Build Android APK
    needs: [quality-backend, quality-frontend]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        working-directory: ./client
        run: npm install

      - name: Build Web App
        working-directory: ./client
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./client
        run: npx cap sync android

      - name: Build APK (Debug)
        working-directory: ./client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MAPARD-Android-Installer.zip
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
